services:
  backend:
    build:
      context: ./Backend
      dockerfile: dockerfile
    image: jasra-backend:prod
    container_name: jasra-backend
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    environment:
      NODE_ENV: production
      PORT: 3500
      FRONTEND_URL: ${PUBLIC_APP_URL:-https://aljassragroup.bayanattechnology.com}
      BACKEND_URL: ${PUBLIC_APP_URL:-https://aljassragroup.bayanattechnology.com}
    expose:
      - "3500"

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_VERSION: ${REACT_APP_VERSION:-v2.1.0}
        REACT_APP_BASE_URL: ${PUBLIC_APP_URL:-https://aljassragroup.bayanattechnology.com}
        REACT_APP_API_URL: ${PUBLIC_APP_URL:-https://aljassragroup.bayanattechnology.com/}
        GENERATE_SOURCEMAP: ${GENERATE_SOURCEMAP:-false}
    image: jasra-frontend:prod
    container_name: jasra-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-8080}:80"
